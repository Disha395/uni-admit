# auth-service/src/main/resources/application.yml

server:
  port: 8081

spring:
  application:
    name: auth-postgres

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update      # use 'validate' once Flyway is added later; 'update' is fine for now during early dev
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8070/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── JWT config — custom properties read via @ConfigurationProperties or @Value ──
jwt:
  secret: "hougo08ygouonpju0y0hhvucvhbbbh78yygbhbhbhb"
  access-token-expiration-ms: 900000        # 15 minutes
  refresh-token-expiration-ms: 604800000    # 7 days

logging:
  level:
    com.example.authservice: DEBUG
    org.springframework.security: INFO